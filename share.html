<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Read. 分享 · 安于闲，乐于独</title>
    <!-- Remix Icon 库 (与主站完全一致) -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* ========== 完全复用 index.html 的卡片与全局样式 (无圆角，结构100%一致) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 色彩变量 (与主站完全一致，包含暗色跟随系统) */
        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-0: #f9f9f9;
            --gray-1: #f0f0f0;
            --gray-2: #e0e0e0;
            --gray-3: #cccccc;
            --gray-4: #999999;
            --gray-5: #666666;
            --gray-6: #333333;
            --gray-7: #222222;
            --overlay-light: rgba(0, 0, 0, 0.1);
            --overlay-medium: rgba(0, 0, 0, 0.3);
            --album-ring: var(--gray-7);
            --album-ring-light: rgba(255,255,255,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --white: #1e1e1e;
                --black: #f9f9f9;
                --gray-0: #1e1e1e;
                --gray-1: #2a2a2a;
                --gray-2: #444444;
                --gray-3: #666666;
                --gray-4: #888888;
                --gray-5: #aaaaaa;
                --gray-6: #e0e0e0;
                --gray-7: #2a2a2a;
                --album-ring: var(--gray-1);
                --album-ring-light: rgba(255,255,255,0.03);
            }
        }

        body {
            font-family: 'fangzhengsongti', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--white);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0 0 24px 0;
            -webkit-user-select: none;
            user-select: none;
        }

        @font-face {
            font-family: 'fangzhengsongti';
            src: url('https://solitudenook.top/font/fangzhengsongti.ttf') format('truetype');
            font-display: swap;
        }

        /* 隐藏滚动条 (与主站一致) */
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        /* ========== 卡片容器核心 (与 index.html 完全一致，无圆角) ========== */
        .card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: var(--white);
            width: 100%;
            padding: 0.5rem 1.25rem;
            box-sizing: border-box;
            border-radius: 0 !important;
            margin-bottom: 1.5rem;
        }
        .card:last-child {
            margin-bottom: 0;
        }
        .card-inner {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background-color: var(--white);
        }
        .card-inner::-webkit-scrollbar {
            width: 0.25rem;
            height: 0.75rem;
        }
        .card-inner::-webkit-scrollbar-track {
            background: none;
        }
        .card-inner::-webkit-scrollbar-thumb {
            background: var(--gray-3);
        }

        /* ---------- 音乐卡片 (完全复刻 index 唱片 + 进度条 + 播放控制) ---------- */
        #album-box {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .album-image {
            position: relative;
            width: 12.5rem;
            height: 12.5rem;
            border-radius: 50%;
            overflow: visible;
            background: transparent;
            box-shadow: 0 0 0 0.25rem var(--album-ring), 0 0 0 0.3125rem var(--album-ring-light),
                        0 0 0 0.5rem var(--album-ring), 0 0 0 0.5625rem var(--album-ring-light),
                        0 0 0 0.75rem var(--album-ring), 0 0 0 0.8125rem var(--album-ring-light),
                        0 0 0 1rem var(--album-ring), 0 0 0 1.0625rem var(--album-ring-light),
                        0 0 0 1.25rem var(--album-ring), 0 0 0 1.3125rem var(--album-ring-light),
                        0 0 0 1.5rem var(--album-ring), 0 0 0 1.5625rem var(--album-ring-light),
                        0 0 0 1.75rem var(--album-ring), 0 0 0 1.8125rem var(--album-ring-light),
                        0 0 0 2rem var(--album-ring), 0 0 0 2.0625rem var(--album-ring-light),
                        0 0 0 2.25rem var(--album-ring), 0 0 0 2.3125rem var(--album-ring-light),
                        0 0 0 2.5rem var(--album-ring), 0 0 0 2.5625rem var(--album-ring-light),
                        0 0 0 2.8125rem var(--album-ring), 0 0 0 2.875rem var(--album-ring-light),
                        0 0 0 2.90625rem var(--album-ring);
        }
        .album-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }
        .player-control-wrapper {
            position: relative;
            height: 3.75rem;
            margin-top: 1.25rem !important;
        }
        .progress-bar {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--gray-0);
            margin: 0;
        }
        .dark-mode .progress-bar {
            background: rgba(255,255,255,0.05);
        }
        .progress-fill {
            height: 100%;
            background-color: var(--gray-1);
            width: 0%;
            transition: width 0.1s linear;
        }
        .player-info-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.5rem;
            box-sizing: border-box;
            pointer-events: none;
        }
        .track-info {
            pointer-events: none;
            flex: 1;
            min-width: 0;
        }
        .play-pause-icon {
            pointer-events: auto;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .play-pause-icon i {
            font-size: 2.25rem;
            line-height: 1;
            color: var(--gray-6);
        }
        .track-album {
            font-size: 1.20rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-6);
            font-style: normal;
        }
        .track-singer {
            font-size: 0.8125rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-4);
        }
        .play-pause-icon.play i.play-icon { display: block; }
        .play-pause-icon.pause i.pause-icon { display: block; }
        .play-pause-icon i.play-icon,
        .play-pause-icon i.pause-icon { display: none; }

        /* ---------- 句子卡片 (与 index #sentence 完全一致) ---------- */
        .sentence-image {
            width: 100%;
            margin-bottom: 1.25rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
        }
        .sentence-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }
        #sentenceText {
            margin: 0 0 1.25rem 0;
            line-height: 1.8;
            font-size: 1rem;
            color: var(--gray-6);
        }
        .from {
            text-align: right;
            margin-top: 0.625rem;
        }
        .from span {
            font-size: 0.875rem;
            color: var(--gray-4);
        }

        /* ---------- 文章卡片 (与 index #article 完全一致) ---------- */
        .bg-img {
            width: 100%;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
        }
        .bg-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }
        .article-info {
            padding-bottom: 0.5rem;
        }
        .title {
            font-size: 1.5rem;
            margin-bottom: 0.375rem;
            color: var(--gray-6);
        }
        .theauthor {
            font-size: 0.875rem;
            margin: 0.625rem 0;
            color: var(--gray-4);
        }
        .article p {
            line-height: 1.4;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: justify;
            color: var(--gray-5);
        }

        /* ========== APP 下载页脚 (无圆角，完全平直) ========== */
        .app-download-bar {
            margin-top: 1.5rem;
            background: var(--white);
            border-top: 1px solid var(--gray-0);
            border-bottom: 1px solid var(--gray-0);
            padding: 0.9rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            width: 100%;
            border-radius: 0 !important;
        }
        .download-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .app-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: var(--gray-7);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }
        .app-text h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-6);
        }
        .app-text p {
            font-size: 0.7rem;
            color: var(--gray-4);
        }
        .download-btn {
            background: var(--gray-7);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
            border-radius: 0;
        }
        .download-btn:active {
            opacity: 0.7;
        }
        @media (prefers-color-scheme: dark) {
            .download-btn {
                background: var(--gray-5);
                color: #1e1e1e;
            }
            .app-icon {
                background: var(--gray-5);
                color: #1e1e1e;
            }
        }

        /* loading & error 状态 */
        .loading-state, .error-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--gray-4);
        }
        .error-state { color: #e5484d; }
        .loading-state i {
            animation: spin 1s linear infinite;
            display: inline-block;
            font-size: 2rem;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app" class="loading-state">
        <i class="ri-loader-4-line"></i>
        <p>正在加载内容...</p>
    </div>

    <script>
        // ========== 分享页核心逻辑 ==========
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date');
        const type = urlParams.get('type'); // 'music', 'sentence', 'article'
        const API_BASE = 'https://solitudenook.top';

        // 音频全局控制 (仅用于音乐卡片)
        let currentAudio = null;
        let currentProgressFill = null;
        let currentPlayBtn = null;
        let isPlayingFlag = false;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // ---------- 音乐卡片：完全复刻 index 结构 (带进度条 & 实时更新) ----------
        function renderMusicCard(music) {
            if (!music || !music.title) return '';
            const coverUrl = music.cover && music.cover.trim() !== '' ? music.cover : '';
            const coverHtml = coverUrl 
                ? `<img src="${escapeHtml(coverUrl)}" alt="cover" onerror="this.src='';">` 
                : '<div style="width:100%;height:100%;background:var(--gray-2);border-radius:50%;"></div>';
            const musicSrc = music.src || '';
            // 嵌入 data-music-src 供 JS 绑定播放器
            return `
                <div class="card" id="music-share-card" data-type="music">
                    <div class="card-inner">
                        <div id="album-box">
                            <div class="album-image">
                                ${coverHtml}
                            </div>
                        </div>
                        <div class="player-control-wrapper" data-music-src="${escapeHtml(musicSrc)}">
                            <div class="progress-bar">
                                <div class="progress-fill" id="shareProgressFill"></div>
                            </div>
                            <div class="player-info-overlay">
                                <div class="track-info">
                                    <p class="track-album">${escapeHtml(music.title)}</p>
                                    <p class="track-singer">${escapeHtml(music.artist || '未知歌手')}</p>
                                </div>
                                <div class="play-pause-icon pause" id="sharePlayPauseBtn">
                                    <i class="ri-play-circle-line pause-icon"></i>
                                    <i class="ri-pause-circle-line play-icon"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 绑定音乐播放器 (进度条实时更新，完全符合 index 交互)
        function initMusicPlayer() {
            const musicCard = document.getElementById('music-share-card');
            if (!musicCard) return;
            const wrapper = musicCard.querySelector('.player-control-wrapper');
            if (!wrapper) return;
            const audioSrc = wrapper.getAttribute('data-music-src');
            if (!audioSrc) return;
            
            // 清理之前的音频实例
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            const audio = new Audio(audioSrc);
            audio.preload = 'metadata';
            currentAudio = audio;
            
            const progressFill = document.getElementById('shareProgressFill');
            const playPauseBtn = document.getElementById('sharePlayPauseBtn');
            if (!progressFill || !playPauseBtn) return;
            
            // 更新进度条
            const updateProgress = () => {
                if (audio.duration && isFinite(audio.duration) && !isNaN(audio.duration)) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = percent + '%';
                } else {
                    progressFill.style.width = '0%';
                }
            };
            
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', updateProgress);
            audio.addEventListener('ended', () => {
                playPauseBtn.classList.remove('play');
                playPauseBtn.classList.add('pause');
                isPlayingFlag = false;
                progressFill.style.width = '0%';
                audio.currentTime = 0;
            });
            
            // 播放/暂停逻辑
            const togglePlay = (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play().catch(err => {
                        console.warn('播放失败', err);
                        showSimpleToast('无法播放，请检查网络');
                    });
                    playPauseBtn.classList.remove('pause');
                    playPauseBtn.classList.add('play');
                    isPlayingFlag = true;
                } else {
                    audio.pause();
                    playPauseBtn.classList.remove('play');
                    playPauseBtn.classList.add('pause');
                    isPlayingFlag = false;
                }
            };
            playPauseBtn.removeEventListener('click', togglePlay);
            playPauseBtn.addEventListener('click', togglePlay);
            
            // 页面卸载时停止音频
            window.addEventListener('beforeunload', () => {
                if (currentAudio) currentAudio.pause();
            });
        }
        
        // 简易 Toast (轻提示)
        function showSimpleToast(msg) {
            let toast = document.querySelector('.share-toast');
            if (toast) toast.remove();
            const div = document.createElement('div');
            div.className = 'share-toast';
            div.innerText = msg;
            div.style.position = 'fixed';
            div.style.bottom = '80px';
            div.style.left = '50%';
            div.style.transform = 'translateX(-50%)';
            div.style.backgroundColor = 'rgba(0,0,0,0.7)';
            div.style.color = '#fff';
            div.style.padding = '6px 14px';
            div.style.borderRadius = '20px';
            div.style.fontSize = '13px';
            div.style.zIndex = '9999';
            div.style.backdropFilter = 'blur(4px)';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1800);
        }
        
        // ---------- 句子卡片 (完全复刻 index) ----------
        function renderSentenceCard(sentence) {
            if (!sentence || !sentence.text) return '';
            const imgHtml = sentence.image 
                ? `<div class="sentence-image"><img src="${escapeHtml(sentence.image)}" alt="句子配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` 
                : '';
            return `
                <div class="card" data-type="sentence">
                    <div class="card-inner">
                        ${imgHtml}
                        <p id="sentenceText">${escapeHtml(sentence.text).replace(/\n/g, '<br>')}</p>
                        ${sentence.author ? `<div class="from"><span>—— ${escapeHtml(sentence.author)}</span></div>` : ''}
                    </div>
                </div>
            `;
        }
        
        // ---------- 文章卡片 (完全复刻 index) ----------
        function renderArticleCard(article) {
            if (!article || !article.title) return '';
            const imgHtml = article.image 
                ? `<div class="bg-img"><img src="${escapeHtml(article.image)}" alt="文章配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` 
                : '';
            return `
                <div class="card" data-type="article">
                    <div class="card-inner">
                        ${imgHtml}
                        <div class="article-info">
                            <div class="title">${escapeHtml(article.title)}</div>
                            <div class="theauthor">文 / ${escapeHtml(article.author || '佚名')}</div>
                            <div class="article"><p>${escapeHtml(article.content || '').replace(/\n/g, '<br>')}</p></div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 图片预览 (增强体验，不影响布局)
        function attachImagePreview() {
            const images = document.querySelectorAll('.album-image img, .sentence-image img, .bg-img img');
            images.forEach(img => {
                if (img.getAttribute('data-preview')) return;
                img.setAttribute('data-preview', 'true');
                img.style.cursor = 'pointer';
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const src = img.getAttribute('src');
                    if (!src) return;
                    const overlay = document.createElement('div');
                    overlay.style.position = 'fixed';
                    overlay.style.top = '0';
                    overlay.style.left = '0';
                    overlay.style.width = '100%';
                    overlay.style.height = '100%';
                    overlay.style.background = 'rgba(0,0,0,0.9)';
                    overlay.style.zIndex = '10000';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.cursor = 'pointer';
                    const previewImg = document.createElement('img');
                    previewImg.src = src;
                    previewImg.style.maxWidth = '90%';
                    previewImg.style.maxHeight = '80%';
                    previewImg.style.objectFit = 'contain';
                    overlay.appendChild(previewImg);
                    overlay.addEventListener('click', () => overlay.remove());
                    document.body.appendChild(overlay);
                });
            });
        }
        
        // 渲染页面主内容 + 底部APP下载栏 (无圆角)
        function renderPageContent(data) {
            let htmlContent = '';
            // 根据 type 展示指定卡片，若无 type 则展示全部 (顺序: 音乐 → 句子 → 文章，与 index 一致)
            if (type === 'music' && data.music && data.music.title) {
                htmlContent = renderMusicCard(data.music);
            } else if (type === 'sentence' && data.sentence && data.sentence.text) {
                htmlContent = renderSentenceCard(data.sentence);
            } else if (type === 'article' && data.article && data.article.title) {
                htmlContent = renderArticleCard(data.article);
            } else {
                // 未指定类型或全部展示
                if (data.music && data.music.title) htmlContent += renderMusicCard(data.music);
                if (data.sentence && data.sentence.text) htmlContent += renderSentenceCard(data.sentence);
                if (data.article && data.article.title) htmlContent += renderArticleCard(data.article);
                if (!htmlContent) htmlContent = '<div class="error-state">暂无任何内容可分享</div>';
            }
            
            // 底部 APP 下载页脚 (无圆角)
            const downloadBar = `
                <div class="app-download-bar">
                    <div class="download-info">
                        <div class="app-icon"><i class="ri-book-open-line"></i></div>
                        <div class="app-text">
                            <h4>Read.</h4>
                            <p>安于闲 · 乐于独 · 每日精选</p>
                        </div>
                    </div>
                    <button class="download-btn" id="appDownloadBtn">下载 App</button>
                </div>
            `;
            
            const app = document.getElementById('app');
            app.innerHTML = htmlContent + downloadBar;
            
            // 如果有音乐卡片，初始化播放器和进度条
            if (document.getElementById('music-share-card')) {
                initMusicPlayer();
            }
            
            // 绑定下载按钮 (跳转至官网)
            const downloadBtn = document.getElementById('appDownloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // 可替换为实际下载地址
                    window.location.href = 'https://solitudenook.top';
                });
            }
            
            // 图片预览功能
            attachImagePreview();
        }
        
        // 从网络获取内容数据 (与主站 API 一致)
        async function loadShareContent() {
            const app = document.getElementById('app');
            if (!date) {
                app.innerHTML = '<div class="error-state">❌ 缺少日期参数，分享链接无效</div>';
                return;
            }
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const res = await fetch(`${API_BASE}/api/posts/${date}`, {
                    cache: 'no-store',
                    headers: { 'Accept': 'application/json' },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderPageContent(data);
            } catch (err) {
                console.error(err);
                let errMsg = err.name === 'AbortError' ? '请求超时，请检查网络' : '内容加载失败，请稍后重试';
                app.innerHTML = `<div class="error-state">${errMsg}<br><span style="font-size:0.8rem;">${escapeHtml(err.message)}</span></div>`;
            }
        }
        
        // 页面启动
        loadShareContent();
        
        // 暗色模式监听：确保进度条背景跟随动态类 (dark-mode 跟随系统)
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const updateDarkClass = () => {
            if (mediaQuery.matches) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        };
        updateDarkClass();
        mediaQuery.addEventListener('change', updateDarkClass);
    </script>
</body>
</html>
