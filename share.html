<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Read. 分享</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; color: #333; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .music-cover { width: 100%; border-radius: 16px; margin-bottom: 16px; }
        .sentence-text { font-size: 18px; line-height: 1.6; font-style: italic; }
        .article-title { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
        .article-author { color: #666; margin-bottom: 16px; }
        .article-content { line-height: 1.8; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .error { text-align: center; padding: 40px; color: #f44336; }
        img { max-width: 100%; height: auto; }
        hr { margin: 20px 0; border: 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date');
        const API_BASE = 'https://solitudenook.top';

        async function loadShareContent() {
            const app = document.getElementById('app');
            if (!date) {
                app.innerHTML = '<div class="error">缺少日期参数</div>';
                return;
            }
            app.innerHTML = '<div class="loading">加载中...</div>';
            try {
                const res = await fetch(`${API_BASE}/api/posts/${date}`);
                if (!res.ok) throw new Error('内容不存在');
                const data = await res.json();
                renderContent(data);
            } catch (err) {
                app.innerHTML = `<div class="error">加载失败，请稍后重试<br>${err.message}</div>`;
            }
        }

        function renderContent(data) {
            const app = document.getElementById('app');
            let html = '';
            // 音乐卡片
            if (data.music && data.music.title) {
                html += `<div class="card">
                    <h3>🎵 音乐推荐</h3>
                    ${data.music.cover ? `<img class="music-cover" src="${data.music.cover}" onerror="this.style.display='none'">` : ''}
                    <div><strong>${escapeHtml(data.music.title)}</strong><br>${escapeHtml(data.music.artist || '')}</div>
                </div>`;
            }
            // 句子卡片
            if (data.sentence && data.sentence.text) {
                html += `<div class="card">
                    <h3>📝 句子摘录</h3>
                    <div class="sentence-text">“${escapeHtml(data.sentence.text).replace(/\n/g, '<br>')}”</div>
                    ${data.sentence.author ? `<div style="margin-top:12px; text-align:right">—— ${escapeHtml(data.sentence.author)}</div>` : ''}
                </div>`;
            }
            // 文章卡片
            if (data.article && data.article.title) {
                html += `<div class="card">
                    <h3>📖 文章</h3>
                    <div class="article-title">${escapeHtml(data.article.title)}</div>
                    <div class="article-author">文/${escapeHtml(data.article.author || '佚名')}</div>
                    ${data.article.image ? `<img src="${data.article.image}" style="max-width:100%; border-radius:12px; margin-bottom:16px;">` : ''}
                    <div class="article-content">${escapeHtml(data.article.content).replace(/\n/g, '<br>')}</div>
                </div>`;
            }
            if (!html) html = '<div class="error">暂无内容</div>';
            app.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        loadShareContent();
    </script>
</body>
</html>
