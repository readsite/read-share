<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Read. 分享</title>
    <!-- Remix Icon CDN (与主站图标库一致) -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* ========== 基础变量 + 重置 (与index完全一致，圆角归零) ========== */
        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-0: #f9f9f9;
            --gray-1: #f0f0f0;
            --gray-2: #e0e0e0;
            --gray-3: #cccccc;
            --gray-4: #999999;
            --gray-5: #666666;
            --gray-6: #333333;
            --gray-7: #222222;
            --overlay-light: rgba(0, 0, 0, 0.1);
            --album-ring: var(--gray-7);
            --album-ring-light: rgba(255,255,255,0.05);
        }

        /* 暗色主题跟随系统 (可选, 保持和主站一致) */
        @media (prefers-color-scheme: dark) {
            :root {
                --white: #1e1e1e;
                --black: #f9f9f9;
                --gray-0: #1e1e1e;
                --gray-1: #2a2a2a;
                --gray-2: #444444;
                --gray-3: #666666;
                --gray-4: #888888;
                --gray-5: #aaaaaa;
                --gray-6: #e0e0e0;
                --gray-7: #2a2a2a;
                --album-ring: var(--gray-1);
                --album-ring-light: rgba(255,255,255,0.03);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: var(--gray-6);
        }

        body {
            font-family: 'fangzhengsongti', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--white);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            padding: 0 0 20px 0;
        }

        /* 方正宋体优先，降级系统字体 */
        @font-face {
            font-family: 'fangzhengsongti';
            src: url('https://solitudenook.top/font/fangzhengsongti.ttf') format('truetype');
            font-display: swap;
        }

        /* 卡片容器 ———— 与index完全一致，无圆角 */
        .card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: var(--white);
            width: 100%;
            padding: 0.5rem 1.25rem;
            box-sizing: border-box;
            border-radius: 0 !important;   /* 强制无圆角 */
            margin-bottom: 1rem;
        }

        .card-inner {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow-y: visible;
            background-color: var(--white);
        }

        /* 共用滚动条 (隐藏) */
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
            display: none;
        }

        /* ========== 音乐卡片样式 (完全遵循 index 唱片风格) ========== */
        #album-box {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .album-image {
            position: relative;
            width: 12.5rem;
            height: 12.5rem;
            border-radius: 50%;
            overflow: visible;
            background: transparent;
            /* 保留唱片纹阴影圈，无圆角影响 (圆形本身就圆，但无卡片圆角) */
            box-shadow: 0 0 0 0.25rem var(--album-ring), 0 0 0 0.3125rem var(--album-ring-light),
                        0 0 0 0.5rem var(--album-ring), 0 0 0 0.5625rem var(--album-ring-light),
                        0 0 0 0.75rem var(--album-ring), 0 0 0 0.8125rem var(--album-ring-light),
                        0 0 0 1rem var(--album-ring), 0 0 0 1.0625rem var(--album-ring-light),
                        0 0 0 1.25rem var(--album-ring), 0 0 0 1.3125rem var(--album-ring-light);
        }
        .album-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }
        .player-info-share {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            gap: 1rem;
        }
        .track-info-share {
            flex: 1;
            min-width: 0;
        }
        .track-album-share {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-6);
        }
        .track-singer-share {
            font-size: 0.8125rem;
            color: var(--gray-4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .play-pause-icon {
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-pause-icon i {
            font-size: 2.25rem;
            line-height: 1;
            color: var(--gray-6);
        }
        .play-pause-icon.play i.play-icon { display: block; }
        .play-pause-icon.pause i.pause-icon { display: block; }
        .play-pause-icon i.play-icon,
        .play-pause-icon i.pause-icon { display: none; }

        /* ========== 句子卡片 (与index #sentence 一致) ========== */
        .sentence-image {
            width: 100%;
            margin-bottom: 1.25rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
        }
        .sentence-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }
        #sentenceText {
            margin: 0 0 1.25rem 0;
            line-height: 1.8;
            font-size: 1rem;
            color: var(--gray-6);
        }
        .from {
            text-align: right;
            margin-top: 0.625rem;
        }
        .from span {
            font-size: 0.875rem;
            color: var(--gray-4);
        }

        /* ========== 文章卡片 (与index #article 一致) ========== */
        .bg-img {
            width: 100%;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
        }
        .bg-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }
        .article-info {
            padding-bottom: 0.5rem;
        }
        .title {
            font-size: 1.5rem;
            margin-bottom: 0.375rem;
            color: var(--gray-6);
        }
        .theauthor {
            font-size: 0.875rem;
            margin: 0.625rem 0;
            color: var(--gray-4);
        }
        .article p {
            line-height: 1.4;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: justify;
            color: var(--gray-5);
        }

        /* 通用内容区域 */
        .card .card-inner > * {
            max-width: 100%;
        }

        /* 底部下载导航栏 (与主站footer风格统一) */
        .app-download-bar {
            margin-top: 2rem;
            margin-bottom: 0;
            background: var(--white);
            border-top: 1px solid var(--gray-0);
            border-bottom: 1px solid var(--gray-0);
            padding: 0.9rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem;
            width: 100%;
        }
        .download-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .app-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: var(--gray-7);
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }
        .app-text h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-6);
        }
        .app-text p {
            font-size: 0.7rem;
            color: var(--gray-4);
        }
        .download-btn {
            background: var(--gray-7);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            font-family: inherit;
        }
        .download-btn:active {
            opacity: 0.7;
        }
        /* 深色适配 */
        @media (prefers-color-scheme: dark) {
            .download-btn {
                background: var(--gray-5);
                color: #1e1e1e;
            }
            .app-icon {
                background: var(--gray-5);
                color: #1e1e1e;
            }
        }

        /* loading & error 保持原生风格 */
        .loading-state, .error-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--gray-4);
        }
        .error-state { color: #e5484d; }
        .loading-state i {
            animation: spin 1s linear infinite;
            display: inline-block;
            font-size: 2rem;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 其他辅助 */
        hr {
            margin: 0 1.25rem;
            border: 0;
            border-top: 1px solid var(--gray-1);
        }
    </style>
</head>
<body>
    <div id="app" class="loading-state">
        <i class="ri-loader-4-line"></i>
        <p>正在加载内容...</p>
    </div>

    <script>
        // 获取URL参数
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date');
        const type = urlParams.get('type'); // 'music', 'sentence', 'article'
        const API_BASE = 'https://solitudenook.top';

        // 全局audio实例 (音乐专用)
        let currentAudio = null;
        let currentPlayBtn = null;

        // 转义HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 渲染音乐卡片 (完全按照 index 布局: 圆形封面 + 歌名歌手 + 播放/暂停图标)
        function renderMusicCard(music) {
            if (!music || !music.title) return '';
            const coverUrl = music.cover && music.cover.trim() !== '' ? music.cover : '';
            const coverHtml = coverUrl ? `<img src="${escapeHtml(coverUrl)}" alt="cover" onerror="this.src='';">` : '<div style="width:100%;height:100%;background:var(--gray-2);border-radius:50%;"></div>';
            return `
                <div class="card" id="music-share-card" data-type="music">
                    <div class="card-inner">
                        <div id="album-box">
                            <div class="album-image">
                                ${coverHtml}
                            </div>
                        </div>
                        <div class="player-info-share">
                            <div class="track-info-share">
                                <div class="track-album-share">${escapeHtml(music.title)}</div>
                                <div class="track-singer-share">${escapeHtml(music.artist || '未知歌手')}</div>
                            </div>
                            <div class="play-pause-icon pause" data-music-src="${escapeHtml(music.src || '')}">
                                <i class="ri-play-circle-line pause-icon"></i>
                                <i class="ri-pause-circle-line play-icon"></i>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 渲染句子卡片 (完全仿 index: 图片容器 + 句子 + from)
        function renderSentenceCard(sentence) {
            if (!sentence || !sentence.text) return '';
            const imgHtml = sentence.image ? `<div class="sentence-image"><img src="${escapeHtml(sentence.image)}" alt="句子配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` : '';
            return `
                <div class="card" data-type="sentence">
                    <div class="card-inner">
                        ${imgHtml}
                        <p id="sentenceText">${escapeHtml(sentence.text).replace(/\n/g, '<br>')}</p>
                        ${sentence.author ? `<div class="from"><span>—— ${escapeHtml(sentence.author)}</span></div>` : ''}
                    </div>
                </div>
            `;
        }

        // 渲染文章卡片 (完全仿 index: 配图 + 标题 + 作者 + 内容)
        function renderArticleCard(article) {
            if (!article || !article.title) return '';
            const imgHtml = article.image ? `<div class="bg-img"><img src="${escapeHtml(article.image)}" alt="文章配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` : '';
            return `
                <div class="card" data-type="article">
                    <div class="card-inner">
                        ${imgHtml}
                        <div class="article-info">
                            <div class="title">${escapeHtml(article.title)}</div>
                            <div class="theauthor">文 / ${escapeHtml(article.author || '佚名')}</div>
                            <div class="article"><p>${escapeHtml(article.content || '').replace(/\n/g, '<br>')}</p></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 绑定音乐播放器 (使用卡片内的播放按钮，实现类似index的播放/暂停切换)
        function bindMusicPlayer() {
            const musicCard = document.querySelector('#music-share-card');
            if (!musicCard) return;
            const playPauseDiv = musicCard.querySelector('.play-pause-icon');
            if (!playPauseDiv) return;
            const audioSrc = playPauseDiv.getAttribute('data-music-src');
            if (!audioSrc) return;

            // 如果已有全局audio且未销毁，先暂停移除事件
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            const audio = new Audio(audioSrc);
            audio.preload = 'none';
            currentAudio = audio;

            // 更新按钮状态
            function updateButtonUI(isPlaying) {
                if (isPlaying) {
                    playPauseDiv.classList.remove('pause');
                    playPauseDiv.classList.add('play');
                } else {
                    playPauseDiv.classList.remove('play');
                    playPauseDiv.classList.add('pause');
                }
            }

            // 播放结束重置
            audio.addEventListener('ended', () => {
                updateButtonUI(false);
            });

            // 点击播放/暂停
            const clickHandler = (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    // 微信/移动端需要用户手势，这里按钮点击已经触发
                    audio.play().catch(err => {
                        console.warn('播放失败', err);
                        // 简单提示
                        const toast = document.createElement('div');
                        toast.innerText = '无法播放，请检查网络';
                        toast.style.position = 'fixed';
                        toast.style.bottom = '80px';
                        toast.style.left = '50%';
                        toast.style.transform = 'translateX(-50%)';
                        toast.style.background = 'rgba(0,0,0,0.7)';
                        toast.style.color = '#fff';
                        toast.style.padding = '6px 12px';
                        toast.style.borderRadius = '20px';
                        toast.style.fontSize = '12px';
                        toast.style.zIndex = '9999';
                        document.body.appendChild(toast);
                        setTimeout(() => toast.remove(), 1500);
                    });
                    updateButtonUI(true);
                } else {
                    audio.pause();
                    updateButtonUI(false);
                }
            };
            playPauseDiv.removeEventListener('click', clickHandler);
            playPauseDiv.addEventListener('click', clickHandler);
        }

        // 主流程：获取数据并渲染，追加底部下载栏
        async function loadShareContent() {
            const app = document.getElementById('app');
            if (!date) {
                app.innerHTML = '<div class="error-state">❌ 缺少日期参数，分享链接无效</div>';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/posts/${date}`, {
                    cache: 'no-store',
                    headers: { 'Accept': 'application/json' }
                });
                if (!res.ok) throw new Error('内容不存在或网络错误');
                const data = await res.json();
                renderPage(data);
            } catch (err) {
                console.error(err);
                app.innerHTML = `<div class="error-state">加载失败，请稍后重试<br>${err.message}</div>`;
            }
        }

        function renderPage(data) {
            const app = document.getElementById('app');
            let htmlContent = '';

            // 根据type参数决定展示单卡片还是全部卡片（兼容旧分享）
            if (type && type === 'music' && data.music && data.music.title) {
                htmlContent = renderMusicCard(data.music);
            } else if (type && type === 'sentence' && data.sentence && data.sentence.text) {
                htmlContent = renderSentenceCard(data.sentence);
            } else if (type && type === 'article' && data.article && data.article.title) {
                htmlContent = renderArticleCard(data.article);
            } else {
                // 未指定type或类型不存在时展示全部内容（与旧分享逻辑一致）
                if (data.music && data.music.title) htmlContent += renderMusicCard(data.music);
                if (data.sentence && data.sentence.text) htmlContent += renderSentenceCard(data.sentence);
                if (data.article && data.article.title) htmlContent += renderArticleCard(data.article);
                if (!htmlContent) htmlContent = '<div class="error-state">暂无任何内容可分享</div>';
            }

            // 底部下载导航栏 (与主站风格融合)
            const downloadBar = `
                <div class="app-download-bar">
                    <div class="download-info">
                        <div class="app-icon"><i class="ri-book-open-line"></i></div>
                        <div class="app-text">
                            <h4>Read.</h4>
                            <p>安于闲 · 乐于独 · 每日精选</p>
                        </div>
                    </div>
                    <button class="download-btn" id="appDownloadBtn">下载 App</button>
                </div>
            `;

            // 注入内容 + 底部栏
            app.innerHTML = htmlContent + downloadBar;

            // 如果存在音乐卡片，绑定播放控制
            if (document.querySelector('#music-share-card')) {
                bindMusicPlayer();
            }

            // 绑定下载按钮事件 (提供模拟跳转，可替换为真实下载地址)
            const downloadBtn = document.getElementById('appDownloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // 真实场景可替换为官方下载链接，此处提供友好提示并跳转 (示意)
                    // 根据需求可以改成 alert 或跳转到下载页面
                    // 演示：跳转至项目主页或下载地址
                    window.location.href = 'https://solitudenook.top';  // 替换为真实下载地址
                    // 备选：也可展示toast引导
                    // 但为满足“APP下载导航栏”要求，直接跳转下载页
                });
            }

            // 额外处理图片点击预览 (可选，提升体验，但不影响主要要求)
            attachImagePreview();
        }

        // 辅助: 图片点击预览 (模仿主站轻交互)
        function attachImagePreview() {
            const images = document.querySelectorAll('.album-image img, .sentence-image img, .bg-img img');
            images.forEach(img => {
                img.style.cursor = 'pointer';
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const src = img.getAttribute('src');
                    if (!src) return;
                    // 简单预览弹窗
                    const overlay = document.createElement('div');
                    overlay.style.position = 'fixed';
                    overlay.style.top = '0';
                    overlay.style.left = '0';
                    overlay.style.width = '100%';
                    overlay.style.height = '100%';
                    overlay.style.background = 'rgba(0,0,0,0.9)';
                    overlay.style.zIndex = '10000';
                    overlay.style.display = 'flex';
                    overlay.style.alignItems = 'center';
                    overlay.style.justifyContent = 'center';
                    overlay.style.cursor = 'pointer';
                    const previewImg = document.createElement('img');
                    previewImg.src = src;
                    previewImg.style.maxWidth = '90%';
                    previewImg.style.maxHeight = '80%';
                    previewImg.style.objectFit = 'contain';
                    overlay.appendChild(previewImg);
                    overlay.addEventListener('click', () => overlay.remove());
                    document.body.appendChild(overlay);
                });
            });
        }

        // 启动加载
        loadShareContent();
    </script>
</body>
</html>
