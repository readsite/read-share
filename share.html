<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Read. 分享 · 安于闲，乐于独</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* ========== 全局重置 + 变量 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-0: #f9f9f9;
            --gray-1: #f0f0f0;
            --gray-2: #e0e0e0;
            --gray-3: #cccccc;
            --gray-4: #999999;
            --gray-5: #666666;
            --gray-6: #333333;
            --gray-7: #222222;
            --album-ring: var(--gray-7);
            --album-ring-light: rgba(255,255,255,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --white: #1e1e1e;
                --black: #f9f9f9;
                --gray-0: #1e1e1e;
                --gray-1: #2a2a2a;
                --gray-2: #444444;
                --gray-3: #666666;
                --gray-4: #888888;
                --gray-5: #aaaaaa;
                --gray-6: #e0e0e0;
                --gray-7: #2a2a2a;
                --album-ring: var(--gray-1);
                --album-ring-light: rgba(255,255,255,0.03);
            }
        }

        body {
            font-family: 'fangzhengsongti', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            user-select: none;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        @font-face {
            font-family: 'fangzhengsongti';
            src: url('https://solitudenook.top/font/fangzhengsongti.ttf') format('truetype');
            font-display: swap;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 0;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-3);
        }

        /* ---------- 全新固定底部布局 (类似index的stats-actions始终贴底) ---------- */
        .share-layout {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            background-color: var(--white);
            position: relative;
            overflow: hidden;
        }

        /* 滚动内容区域 — 占据所有剩余空间，内部滚动 */
        .share-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        /* 卡片内容包装器 (普通流式布局) */
        .cards-wrapper {
            padding: 0.5rem 1.25rem 1rem 1.25rem;
            width: 100%;
        }

        /* 只有音乐卡片时的垂直居中容器 (填充整个滚动区域，实现视觉居中) */
        .music-center-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            width: 100%;
            padding: 1rem 1.25rem;
        }

        /* 重置卡片为普通块级元素，移除绝对定位及固定高度，保证自然滚动 */
        .card {
            position: relative !important;
            display: flex;
            flex-direction: column;
            width: 100% !important;
            height: auto !important;
            min-height: auto !important;
            padding: 0;
            background-color: transparent;
            transform: none !important;
            transition: none !important;
            margin: 0;
        }

        /* 卡片内部容器：移除滚动，所有滚动交给父级 .share-scroll-area */
        .card .card-inner {
            overflow-y: visible !important;
            background-color: transparent;
            padding: 0;
            scrollbar-width: none;
        }

        /* 覆盖文章卡片可能出现的内部滚动条 */
        .card#article .card-inner {
            overflow-y: visible !important;
            padding-right: 0;
        }

        /* 音乐卡片内部布局微调 (保留视觉节奏) */
        .music-card-wrapper {
            width: 100%;
        }

        #album-box {
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-image {
            position: relative;
            width: 12.5rem;
            height: 12.5rem;
            border-radius: 50%;
            overflow: visible;
            background: transparent;
            box-shadow: 0 0 0 0.25rem var(--album-ring), 0 0 0 0.3125rem var(--album-ring-light),
                        0 0 0 0.5rem var(--album-ring), 0 0 0 0.5625rem var(--album-ring-light),
                        0 0 0 0.75rem var(--album-ring), 0 0 0 0.8125rem var(--album-ring-light),
                        0 0 0 1rem var(--album-ring), 0 0 0 1.0625rem var(--album-ring-light),
                        0 0 0 1.25rem var(--album-ring), 0 0 0 1.3125rem var(--album-ring-light),
                        0 0 0 1.5rem var(--album-ring), 0 0 0 1.5625rem var(--album-ring-light),
                        0 0 0 1.75rem var(--album-ring), 0 0 0 1.8125rem var(--album-ring-light),
                        0 0 0 2rem var(--album-ring), 0 0 0 2.0625rem var(--album-ring-light),
                        0 0 0 2.25rem var(--album-ring), 0 0 0 2.3125rem var(--album-ring-light),
                        0 0 0 2.5rem var(--album-ring), 0 0 0 2.5625rem var(--album-ring-light),
                        0 0 0 2.8125rem var(--album-ring), 0 0 0 2.875rem var(--album-ring-light),
                        0 0 0 2.90625rem var(--album-ring);
        }

        .album-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }

        .player-control-wrapper {
            position: relative;
            height: 3.75rem;
            margin-top: 1.5rem;
        }

        .progress-bar {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--gray-0);
            margin: 0;
        }

        .dark-mode .progress-bar {
            background: rgba(255,255,255,0.05);
        }

        .progress-fill {
            height: 100%;
            background-color: var(--gray-1);
            width: 0%;
            transition: width 0.1s linear;
        }

        .player-info-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.5rem;
            box-sizing: border-box;
            pointer-events: none;
        }

        .track-info {
            pointer-events: none;
            flex: 1;
            min-width: 0;
            text-align: left;
        }

        .play-pause-icon {
            pointer-events: auto;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .play-pause-icon i {
            font-size: 2rem;
            line-height: 1;
            color: var(--gray-6);
        }

        .track-album {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-6);
        }

        .track-singer {
            font-size: 0.75rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-4);
        }

        .play-pause-icon.play i.play-icon { display: block; }
        .play-pause-icon.pause i.pause-icon { display: block; }
        .play-pause-icon i.play-icon,
        .play-pause-icon i.pause-icon { display: none; }

        /* 句子卡片样式 */
        .sentence-image {
            width: 100%;
            margin-bottom: 1rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
            border-radius: 4px;
        }

        .sentence-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }

        #sentenceText {
            margin: 0 0 0.8rem 0;
            line-height: 1.7;
            font-size: 1rem;
            color: var(--gray-6);
            text-align: left;
        }

        .from {
            text-align: right;
            margin-top: 0.4rem;
        }

        .from span {
            font-size: 0.8rem;
            color: var(--gray-4);
        }

        /* 文章卡片样式 */
        .bg-img {
            width: 100%;
            margin-bottom: 1rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
            border-radius: 4px;
        }

        .bg-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }

        .article-info {
            padding-bottom: 0.5rem;
            text-align: left;
        }

        .title {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
            color: var(--gray-6);
        }

        .theauthor {
            font-size: 0.8rem;
            margin: 0.5rem 0;
            color: var(--gray-4);
        }

        .article p,
        .article-text-full,
        .article-truncated {
            line-height: 1.5;
            font-size: 1rem;
            font-weight: 500;
            text-align: justify;
            color: var(--gray-5);
            word-break: break-word;
        }

        .read-more-static {
            display: inline-block;
            margin-top: 12px;
            color: var(--gray-5);
            background: var(--gray-1);
            padding: 4px 12px;
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.75;
            letter-spacing: 0.3px;
            cursor: default;
            pointer-events: none;
            font-family: inherit;
            border-radius: 20px;
        }

        /* 底部下载栏 — 固定底部，与 index 的 stats-actions 视觉一致 */
        .app-download-bar {
            background: var(--white);
            border-top: 1px solid var(--gray-0);
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
            width: 100%;
            flex-shrink: 0;
            backdrop-filter: blur(0px);
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.02);
        }

        .download-info {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-align: left;
        }

        .app-icon {
            width: 2.2rem;
            height: 2.2rem;
            background: var(--gray-7);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            border-radius: 12px;
            overflow: hidden;
        }

        .appicon {
            width: 52px;
            height: 52px;
        }

        .app-text h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gray-6);
        }

        .app-text p {
            font-size: 0.65rem;
            color: var(--gray-4);
        }

        .download-btn {
            background: var(--gray-7);
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            border-radius: 30px;
            transition: opacity 0.2s;
        }

        .download-btn:active {
            opacity: 0.7;
        }

        @media (prefers-color-scheme: dark) {
            .download-btn {
                background: var(--gray-5);
                color: #1e1e1e;
            }
            .app-icon {
                background: var(--gray-5);
                color: #1e1e1e;
            }
        }

        /* 加载和错误状态 */
        .loading-state, .error-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--gray-4);
        }

        .error-state {
            color: #e5484d;
        }

        i, .ri-loader-4-line {
            animation: none !important;
        }

        /* 文章内容排版细节 */
        .article p, .article-text-full, .article-truncated {
            line-height: 1.6;
            word-break: break-word;
        }

        /* 卡片内部额外边距优化 */
        .sentence-card-wrapper,
        .article-card-wrapper,
        .music-card-wrapper {
            width: 100%;
        }

        .card .card-inner > *:first-child {
            margin-top: 0;
        }
        
        /* 消除旧有绝对定位可能造成的偏移 */
        .card-container {
            display: none;
        }

        /* toast 轻提示 (无旋转) */
        .share-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 6px 14px;
            font-size: 13px;
            z-index: 9999;
            backdrop-filter: blur(4px);
            border-radius: 40px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="app" class="loading-state">
        <p>加载中...</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const date = urlParams.get('date');
        const type = urlParams.get('type');
        const API_BASE = 'https://solitudenook.top';

        let currentAudio = null;

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // 音乐卡片渲染 (结构干净，无绝对定位依赖)
        function renderMusicCard(music) {
            if (!music || !music.title) return '';
            const coverUrl = music.cover?.trim() || '';
            const coverHtml = coverUrl 
                ? `<img src="${escapeHtml(coverUrl)}" alt="cover" onerror="this.src='';">` 
                : '<div style="width:100%;height:100%;background:var(--gray-2);border-radius:50%;"></div>';
            return `
                <div class="music-card-wrapper">
                    <div class="card" id="music-share-card" data-type="music">
                        <div class="card-inner">
                            <div id="album-box">
                                <div class="album-image">${coverHtml}</div>
                            </div>
                            <div class="player-control-wrapper" data-music-src="${escapeHtml(music.src || '')}">
                                <div class="progress-bar"><div class="progress-fill" id="shareProgressFill"></div></div>
                                <div class="player-info-overlay">
                                    <div class="track-info">
                                        <p class="track-album">${escapeHtml(music.title)}</p>
                                        <p class="track-singer">${escapeHtml(music.artist || '未知歌手')}</p>
                                    </div>
                                    <div class="play-pause-icon pause" id="sharePlayPauseBtn">
                                        <i class="ri-play-circle-line pause-icon"></i>
                                        <i class="ri-pause-circle-line play-icon"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 句子卡片渲染
        function renderSentenceCard(sentence) {
            if (!sentence?.text) return '';
            const imgHtml = sentence.image 
                ? `<div class="sentence-image"><img src="${escapeHtml(sentence.image)}" alt="句子配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` 
                : '';
            return `
                <div class="sentence-card-wrapper">
                    <div class="card" data-type="sentence">
                        <div class="card-inner">
                            ${imgHtml}
                            <p id="sentenceText">${escapeHtml(sentence.text).replace(/\n/g, '<br>')}</p>
                            ${sentence.author ? `<div class="from"><span>—— ${escapeHtml(sentence.author)}</span></div>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // 文章卡片渲染 (保留“查看余下全文”静态提示)
        function renderArticleCard(article) {
            if (!article?.title) return '';
            const imgHtml = article.image 
                ? `<div class="bg-img"><img src="${escapeHtml(article.image)}" alt="文章配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` 
                : '';
            const rawContent = article.content || '';
            const isLong = rawContent.length > 800;
            let contentHtml = '';
            
            if (isLong) {
                const truncatedText = rawContent.slice(0, 800);
                const escapedTruncated = escapeHtml(truncatedText).replace(/\n/g, '<br>');
                contentHtml = `
                    <div class="article-text-wrapper">
                        <div class="article-truncated">${escapedTruncated}…</div>
                        <span class="read-more-static">下载App查看余下全文</span>
                    </div>
                `;
            } else {
                const fullEscaped = escapeHtml(rawContent).replace(/\n/g, '<br>');
                contentHtml = `<div class="article-text-full">${fullEscaped}</div>`;
            }
            
            return `
                <div class="article-card-wrapper">
                    <div class="card" data-type="article" id="article-share-card">
                        <div class="card-inner">
                            ${imgHtml}
                            <div class="article-info">
                                <div class="title">${escapeHtml(article.title)}</div>
                                <div class="theauthor">文 / ${escapeHtml(article.author || '佚名')}</div>
                                <div class="article">${contentHtml}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 音乐播放器初始化 (完全保留原有逻辑)
        function initMusicPlayer() {
            const musicCard = document.getElementById('music-share-card');
            if (!musicCard) return;
            const wrapper = musicCard.querySelector('.player-control-wrapper');
            if (!wrapper) return;
            const audioSrc = wrapper.getAttribute('data-music-src');
            if (!audioSrc) return;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            const audio = new Audio(audioSrc);
            audio.preload = 'metadata';
            currentAudio = audio;
            const progressFill = document.getElementById('shareProgressFill');
            const playPauseBtn = document.getElementById('sharePlayPauseBtn');
            if (!progressFill || !playPauseBtn) return;
            const updateProgress = () => {
                if (audio.duration && isFinite(audio.duration)) {
                    progressFill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
                } else {
                    progressFill.style.width = '0%';
                }
            };
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', updateProgress);
            audio.addEventListener('ended', () => {
                playPauseBtn.classList.remove('play');
                playPauseBtn.classList.add('pause');
                progressFill.style.width = '0%';
                audio.currentTime = 0;
            });
            const togglePlay = (e) => {
                e.stopPropagation();
                if (audio.paused) {
                    audio.play().catch(() => showSimpleToast('无法播放，请检查网络'));
                    playPauseBtn.classList.remove('pause');
                    playPauseBtn.classList.add('play');
                } else {
                    audio.pause();
                    playPauseBtn.classList.remove('play');
                    playPauseBtn.classList.add('pause');
                }
            };
            playPauseBtn.removeEventListener('click', togglePlay);
            playPauseBtn.addEventListener('click', togglePlay);
            window.addEventListener('beforeunload', () => audio.pause());
        }

        function showSimpleToast(msg) {
            let toast = document.querySelector('.share-toast');
            if (toast) toast.remove();
            const div = document.createElement('div');
            div.className = 'share-toast';
            div.innerText = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1800);
        }

        // 全新渲染：固定底部布局，内容区域滚动，完美兼容所有卡片类型，音乐卡片垂直居中
        function renderPageContent(data) {
            let cardsHtml = '';
            let hasMusic = false, hasSentence = false, hasArticle = false;

            if (type === 'music' && data.music?.title) {
                cardsHtml = renderMusicCard(data.music);
                hasMusic = true;
            } else if (type === 'sentence' && data.sentence?.text) {
                cardsHtml = renderSentenceCard(data.sentence);
                hasSentence = true;
            } else if (type === 'article' && data.article?.title) {
                cardsHtml = renderArticleCard(data.article);
                hasArticle = true;
            } else {
                if (data.music?.title) { cardsHtml += renderMusicCard(data.music); hasMusic = true; }
                if (data.sentence?.text) { cardsHtml += renderSentenceCard(data.sentence); hasSentence = true; }
                if (data.article?.title) { cardsHtml += renderArticleCard(data.article); hasArticle = true; }
                if (!cardsHtml) cardsHtml = '<div class="error-state">暂无任何内容可分享</div>';
            }

            // 判断是否仅音乐卡片 (用于垂直居中布局)
            const onlyMusic = hasMusic && !hasSentence && !hasArticle;
            
            // 构建底部固定栏
            const downloadBar = `
                <div class="app-download-bar">
                    <div class="download-info">
                        <div class="app-icon"><img class="appicon" src="icon-192.png" alt="app icon"></div>
                        <div class="app-text"><h4>Read.</h4><p>安于闲 · 乐于独 · 每日精选</p></div>
                    </div>
                    <button class="download-btn" id="appDownloadBtn">下载 App</button>
                </div>
            `;
            
            let mainContent = '';
            if (onlyMusic) {
                // 音乐卡片垂直居中：在滚动区域内使用flex居中容器
                mainContent = `
                    <div class="share-layout">
                        <div class="share-scroll-area">
                            <div class="music-center-wrapper">
                                ${cardsHtml}
                            </div>
                        </div>
                        ${downloadBar}
                    </div>
                `;
            } else {
                // 普通内容（句子/文章/混合）自然从上到下排列，滚动区域正常滚动
                mainContent = `
                    <div class="share-layout">
                        <div class="share-scroll-area">
                            <div class="cards-wrapper">
                                ${cardsHtml}
                            </div>
                        </div>
                        ${downloadBar}
                    </div>
                `;
            }
            
            const app = document.getElementById('app');
            app.innerHTML = mainContent;
            
            // 如果有音乐卡片，初始化播放器
            if (hasMusic) initMusicPlayer();
            
            // 绑定下载按钮事件
            const downloadBtn = document.getElementById('appDownloadBtn');
            if (downloadBtn) downloadBtn.addEventListener('click', () => window.location.href = 'https://read-download.solitudenook.top');
        }

        async function loadShareContent() {
            const app = document.getElementById('app');
            if (!date) {
                app.innerHTML = '<div class="error-state">缺少日期参数，分享链接无效</div>';
                return;
            }
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const res = await fetch(`${API_BASE}/api/posts/${date}`, { cache: 'no-store', signal: controller.signal });
                clearTimeout(timeoutId);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                renderPageContent(data);
            } catch (err) {
                app.innerHTML = `<div class="error-state">加载失败，请稍后重试<br>${escapeHtml(err.message)}</div>`;
            }
        }

        loadShareContent();

        // 暗色模式跟随系统
        const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
        const updateDarkClass = () => {
            if (mediaQuery.matches) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        };
        updateDarkClass();
        mediaQuery.addEventListener('change', updateDarkClass);
        
        // 额外样式补丁：保证图片自适应与卡片圆润
        const styleFix = document.createElement('style');
        styleFix.textContent = `
            .cards-wrapper .card, .music-center-wrapper .card {
                max-width: 100%;
                margin: 0 auto;
            }
            .music-center-wrapper {
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }
            .share-scroll-area {
                scroll-behavior: smooth;
            }
            .app-download-bar {
                background: var(--white);
                border-top: 1px solid var(--gray-1);
            }
            .dark-mode .app-download-bar {
                border-top-color: rgba(255,255,255,0.08);
            }
            .card .card-inner img {
                border-radius: 12px;
            }
            .sentence-image, .bg-img {
                border-radius: 16px;
            }
        `;
        document.head.appendChild(styleFix);
    </script>
</body>
</html>
