<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Read. 分享 · 安于闲，乐于独</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        /* ========== 全局重置 + 变量 (与 index 完全一致) ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --white: #ffffff;
            --black: #000000;
            --gray-0: #f9f9f9;
            --gray-1: #f0f0f0;
            --gray-2: #e0e0e0;
            --gray-3: #cccccc;
            --gray-4: #999999;
            --gray-5: #666666;
            --gray-6: #333333;
            --gray-7: #222222;
            --album-ring: var(--gray-7);
            --album-ring-light: rgba(255,255,255,0.05);
            --overlay-heavy: rgba(0, 0, 0, 0.9);
            --toast-bg: rgba(0, 0, 0, 0.7);
            --toast-text: #ffffff;
        }

        /* 暗色主题 (跟随系统，与 index 行为一致) */
        @media (prefers-color-scheme: dark) {
            :root {
                --white: #1e1e1e;
                --black: #f9f9f9;
                --gray-0: #1e1e1e;
                --gray-1: #2a2a2a;
                --gray-2: #444444;
                --gray-3: #666666;
                --gray-4: #888888;
                --gray-5: #aaaaaa;
                --gray-6: #e0e0e0;
                --gray-7: #2a2a2a;
                --album-ring: var(--gray-1);
                --album-ring-light: rgba(255,255,255,0.03);
                --toast-bg: rgba(0, 0, 0, 0.8);
                --toast-text: #f0f0f0;
            }
            body.dark-mode-fix {
                background-color: var(--white);
            }
        }

        body {
            font-family: 'fangzhengsongti', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            touch-action: manipulation;
            user-select: none;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        @font-face {
            font-family: 'fangzhengsongti';
            src: url('https://solitudenook.top/font/fangzhengsongti.ttf') format('truetype');
            font-display: swap;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 0;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gray-3);
            border-radius: 4px;
        }

        /* ========== 主布局：固定底部栏，内容滚动 ========== */
        .share-app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background-color: var(--white);
        }

        /* 滚动区域：弹性列布局，支持垂直居中 */
        .share-scroll-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            display: flex;
            flex-direction: column;
        }

        /* 卡片容器内边距（与 index 卡片区域对齐） */
        .card-wrapper {
            padding: 0.5rem 1.25rem 1.5rem 1.25rem;
            width: 100%;
        }

        /* 垂直居中模式（仅对音乐卡片生效） */
        .share-scroll-area.vertical-center-mode .card-wrapper {
            margin: auto 0;
        }

        /* ---------- 卡片核心样式 (与 index 完全一致) ---------- */
        .card {
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            width: 100%;
            height: auto;
            border-radius: 0;
            position: relative;
        }

        .card .card-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: visible;
            background-color: var(--white);
        }

        /* 音乐卡片专用 */
        #album-box {
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .album-image {
            position: relative;
            width: 12.5rem;
            height: 12.5rem;
            border-radius: 50%;
            overflow: visible;
            background: transparent;
            box-shadow: 0 0 0 0.25rem var(--album-ring), 0 0 0 0.3125rem var(--album-ring-light),
                        0 0 0 0.5rem var(--album-ring), 0 0 0 0.5625rem var(--album-ring-light),
                        0 0 0 0.75rem var(--album-ring), 0 0 0 0.8125rem var(--album-ring-light),
                        0 0 0 1rem var(--album-ring), 0 0 0 1.0625rem var(--album-ring-light),
                        0 0 0 1.25rem var(--album-ring), 0 0 0 1.3125rem var(--album-ring-light),
                        0 0 0 1.5rem var(--album-ring), 0 0 0 1.5625rem var(--album-ring-light),
                        0 0 0 1.75rem var(--album-ring), 0 0 0 1.8125rem var(--album-ring-light),
                        0 0 0 2rem var(--album-ring), 0 0 0 2.0625rem var(--album-ring-light),
                        0 0 0 2.25rem var(--album-ring), 0 0 0 2.3125rem var(--album-ring-light),
                        0 0 0 2.5rem var(--album-ring), 0 0 0 2.5625rem var(--album-ring-light),
                        0 0 0 2.8125rem var(--album-ring), 0 0 0 2.875rem var(--album-ring-light),
                        0 0 0 2.90625rem var(--album-ring);
        }
        /* 旋转动画 (与 index 主站完全一致) */
        .album-image.rotating {
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .album-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            position: relative;
            z-index: 1;
        }
        .player-control-wrapper {
            position: relative;
            height: 3.75rem;
            margin-top: 3rem;  
        }
        .progress-bar {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--gray-0);
            margin: 0;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--gray-1);
            width: 0%;
            transition: width 0.1s linear;
        }
        .player-info-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0.5rem;
            box-sizing: border-box;
            pointer-events: none;
        }
        .track-info {
            pointer-events: none;
            flex: 1;
            min-width: 0;
        }
        .play-pause-icon {
            pointer-events: auto;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }
        .play-pause-icon i {
            font-size: 2.25rem;
            line-height: 1;
            color: var(--gray-6);
        }
        .track-album {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-6);
        }
        .track-singer {
            font-size: 0.8125rem;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--gray-4);
        }
        .play-pause-icon.play i.play-icon { display: block; }
        .play-pause-icon.pause i.pause-icon { display: block; }
        .play-pause-icon i.play-icon,
        .play-pause-icon i.pause-icon { display: none; }

        /* 句子卡片 */
        .sentence-image {
            width: 100%;
            margin-bottom: 1.25rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
            border-radius: 0;
        }
        .sentence-image img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }
        #sentenceText {
            margin: 0 0 1.25rem 0;
            line-height: 1.8;
            font-size: 1rem;
            color: var(--gray-6);
            white-space: pre-wrap;
        }
        .from {
            text-align: right;
            margin-top: 0.625rem;
        }
        .from span {
            font-size: 0.875rem;
            color: var(--gray-4);
        }

        /* 文章卡片 */
        .bg-img {
            width: 100%;
            margin-bottom: 1.5rem;
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background-color: var(--gray-1);
        }
        .bg-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            object-position: top;
        }
        .article-info {
            padding-bottom: 0.5rem;
        }
        .title {
            font-size: 1.5rem;
            margin-bottom: 0.375rem;
            color: var(--gray-6);
        }
        .theauthor {
            font-size: 0.875rem;
            margin: 0.625rem 0;
            color: var(--gray-4);
        }
        .article p, .article-content-full {
            line-height: 1.5;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: justify;
            color: var(--gray-5);
            word-break: break-word;
        }
        .article-content-full {
            white-space: pre-wrap;
        }
        /* 文章内容不足全内容提示 (下载APP引导) */
        .full-content-hint {
            margin-top: 1.5rem;
            padding: 0.75rem 1rem;
            background-color: var(--gray-1);
            color: var(--gray-4);
            font-size: 0.85rem;
            text-align: center;
            border-radius: 0;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        /* 底部下载栏 — 固定底部，与 index stats-actions 类似视觉 */
        .app-download-bar {
            background: var(--white);
            padding: 0.7rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            width: 100%;
            flex-shrink: 0;
            backdrop-filter: blur(0px);
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
            z-index: 10;
        }
        .download-info {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            text-align: left;
        }
        .app-icon {
            width: 2.8rem;
            height: 2.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-text h4 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-6);
        }
        .app-text p {
            font-size: 0.8rem;
            color: var(--gray-4);
        }
        .download-btn {
            background: var(--gray-7);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .download-btn:active {
            opacity: 0.7;
        }
        @media (prefers-color-scheme: dark) {
            .download-btn {
                background: var(--gray-5);
                color: #1e1e1e;
            }
        }

        /* toast 提示 */
        .share-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--toast-bg);
            color: var(--toast-text);
            padding: 6px 16px;
            font-size: 13px;
            border-radius: 40px;
            z-index: 10000;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            pointer-events: none;
        }

        /* 加载/错误状态 */
        .loading-state, .error-state {
            text-align: center;
            padding: 3rem 1.5rem;
            color: var(--gray-4);
        }
        .error-state {
            color: #e5484d;
        }
        .ri-loader-4-line {
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 0.5rem;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="shareRoot" class="share-app">
    <div class="share-scroll-area" id="scrollArea">
        <div class="card-wrapper" id="cardContainer">
            <!-- 动态渲染卡片内容 -->
        </div>
    </div>
    <div class="app-download-bar" id="downloadBar">
        <div class="download-info">
            <div class="app-icon">
                <img src="icon-192.png" alt="icon">
            </div>
            <div class="app-text">
                <h4>Read.</h4>
                <p>安于闲 · 乐于独 · 每日精选</p>
            </div>
        </div>
        <button class="download-btn" id="appDownloadBtn">下载 App</button>
    </div>
</div>

<script>
    // ========== 工具函数 ==========
    const urlParams = new URLSearchParams(window.location.search);
    const date = urlParams.get('date');
    const type = urlParams.get('type');   // 'music', 'sentence', 'article'
    const API_BASE = 'https://solitudenook.top';

    let currentAudio = null;

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) { return c; });
    }

    function showToast(msg, duration = 1800) {
        let toast = document.querySelector('.share-toast');
        if (toast) toast.remove();
        const div = document.createElement('div');
        div.className = 'share-toast';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), duration);
    }

    // 控制音乐卡片垂直居中模式 (仅当 type === 'music')
    function setVerticalCenterMode(isMusicMode) {
        const scrollArea = document.getElementById('scrollArea');
        if (!scrollArea) return;
        if (isMusicMode) {
            scrollArea.classList.add('vertical-center-mode');
        } else {
            scrollArea.classList.remove('vertical-center-mode');
        }
    }

    // 截取文章内容 (前800字)
    function truncateArticleContent(content, limit = 800) {
        if (!content) return { text: '', needTruncate: false };
        const raw = content;
        if (raw.length <= limit) {
            return { text: raw, needTruncate: false };
        }
        // 截取前 limit 个字符，并添加省略号
        let truncated = raw.slice(0, limit);
        // 保证截取后不截断半个字符（JS原生slice安全）
        return { text: truncated + '...', needTruncate: true };
    }

    // ========== 音乐播放器初始化 (支持专辑封面旋转，与 index 主站行为一致) ==========
    function initMusicPlayer(musicSrc, title, artist) {
        if (!musicSrc) return;
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        const audio = new Audio(musicSrc);
        audio.preload = 'metadata';
        currentAudio = audio;
        const progressFill = document.getElementById('shareProgressFill');
        const playPauseBtn = document.getElementById('sharePlayPauseBtn');
        // 获取封面旋转元素
        const albumImageContainer = document.querySelector('.album-image');
        
        if (!progressFill || !playPauseBtn) return;
        
        // 旋转控制函数
        const startRotation = () => {
            if (albumImageContainer) albumImageContainer.classList.add('rotating');
        };
        const stopRotation = () => {
            if (albumImageContainer) albumImageContainer.classList.remove('rotating');
        };
        
        const updateProgress = () => {
            if (audio.duration && isFinite(audio.duration)) {
                progressFill.style.width = (audio.currentTime / audio.duration) * 100 + '%';
            } else {
                progressFill.style.width = '0%';
            }
        };
        
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateProgress);
        
        // 播放时开始旋转
        audio.addEventListener('play', () => {
            startRotation();
        });
        // 暂停时停止旋转
        audio.addEventListener('pause', () => {
            stopRotation();
        });
        audio.addEventListener('ended', () => {
            stopRotation();
            playPauseBtn.classList.remove('play');
            playPauseBtn.classList.add('pause');
            progressFill.style.width = '0%';
            audio.currentTime = 0;
        });
        
        const togglePlay = (e) => {
            e.stopPropagation();
            if (audio.paused) {
                audio.play().catch(() => showToast('无法播放，请检查网络'));
                playPauseBtn.classList.remove('pause');
                playPauseBtn.classList.add('play');
            } else {
                audio.pause();
                playPauseBtn.classList.remove('play');
                playPauseBtn.classList.add('pause');
            }
        };
        playPauseBtn.removeEventListener('click', togglePlay);
        playPauseBtn.addEventListener('click', togglePlay);
        
        // 确保初始化时停止旋转状态
        stopRotation();
    }

    // ========== 卡片渲染：音乐、句子、文章（文章支持截断前800字+下载提示） ==========
    function renderMusicCard(music) {
        if (!music || !music.title) return '';
        const coverUrl = music.cover?.trim() || '';
        const coverHtml = coverUrl ? `<img id="shareAlbumImg" src="${escapeHtml(coverUrl)}" alt="cover" onerror="this.src='';">` : '<div style="width:100%;height:100%;background:var(--gray-2);border-radius:50%;"></div>';
        return `
            <div class="card" id="music-share-card">
                <div class="card-inner">
                    <div id="album-box">
                        <div class="album-image">${coverHtml}</div>
                    </div>
                    <div class="player-control-wrapper" data-music-src="${escapeHtml(music.src || '')}">
                        <div class="progress-bar"><div class="progress-fill" id="shareProgressFill"></div></div>
                        <div class="player-info-overlay">
                            <div class="track-info">
                                <p class="track-album">${escapeHtml(music.title)}</p>
                                <p class="track-singer">${escapeHtml(music.artist || '未知歌手')}</p>
                            </div>
                            <div class="play-pause-icon pause" id="sharePlayPauseBtn">
                                <i class="ri-play-circle-line pause-icon"></i>
                                <i class="ri-pause-circle-line play-icon"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderSentenceCard(sentence) {
        if (!sentence?.text) return '';
        const rawText = sentence.text || '';
        const escapedText = escapeHtml(rawText);
        const textWithBreaks = escapedText.replace(/\n/g, '<br>');
        const imgHtml = sentence.image ? `<div class="sentence-image"><img id="shareSentenceImg" src="${escapeHtml(sentence.image)}" alt="句子配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` : '';
        return `
            <div class="card" data-type="sentence">
                <div class="card-inner">
                    ${imgHtml}
                    <p id="sentenceText">${textWithBreaks}</p>
                    ${sentence.author ? `<div class="from"><span>—— ${escapeHtml(sentence.author)}</span></div>` : ''}
                </div>
            </div>
        `;
    }

    function renderArticleCard(article) {
        if (!article?.title) return '';
        // 原始纯文本内容
        const rawContent = article.content || '';
        // 截取前800字逻辑
        const { text: truncatedText, needTruncate } = truncateArticleContent(rawContent, 800);
        // 对截取后的文本进行转义和换行处理
        const contentToDisplay = needTruncate ? truncatedText : rawContent;
        const escapedContent = escapeHtml(contentToDisplay);
        const contentWithBreaks = escapedContent.replace(/\n/g, '<br>');
        
        const imgHtml = article.image ? `<div class="bg-img"><img id="shareArticleImg" src="${escapeHtml(article.image)}" alt="文章配图" onerror="this.style.display='none';this.parentElement.style.display='none'"></div>` : '';
        
        // 如果需要截断，则在文章内容末尾追加提示条
        const hintHtml = needTruncate ? `<div class="full-content-hint">📖 下载APP查看全内容</div>` : '';
        
        return `
            <div class="card" data-type="article">
                <div class="card-inner">
                    ${imgHtml}
                    <div class="article-info">
                        <div class="title">${escapeHtml(article.title)}</div>
                        <div class="theauthor">文 / ${escapeHtml(article.author || '佚名')}</div>
                        <div class="article-content-full">${contentWithBreaks}</div>
                        ${hintHtml}
                    </div>
                </div>
            </div>
        `;
    }

    // 主渲染逻辑
    function renderContent(data) {
        const container = document.getElementById('cardContainer');
        if (!container) return;
        let html = '';
        let hasMusic = false;
        let isPureMusicMode = false;

        // 优先根据 type 参数展示指定卡片，若无效则按顺序展示所有
        if (type === 'music' && data.music?.title) {
            html = renderMusicCard(data.music);
            hasMusic = true;
            isPureMusicMode = true;
        } else if (type === 'sentence' && data.sentence?.text) {
            html = renderSentenceCard(data.sentence);
            isPureMusicMode = false;
        } else if (type === 'article' && data.article?.title) {
            html = renderArticleCard(data.article);
            isPureMusicMode = false;
        } else {
            // 兼容旧链接或未传type: 展示全部卡片，顺序与 index 一致
            if (data.music?.title) { 
                html += renderMusicCard(data.music); 
                hasMusic = true; 
            }
            if (data.sentence?.text) { 
                html += renderSentenceCard(data.sentence); 
            }
            if (data.article?.title) { 
                html += renderArticleCard(data.article); 
            }
            if (!html) html = '<div class="error-state">暂无内容可分享</div>';
            isPureMusicMode = false;
        }

        container.innerHTML = html;

        // 音乐播放器启动 (只有真正存在音乐卡片时才初始化)
        if (hasMusic && data.music?.src) {
            initMusicPlayer(data.music.src, data.music.title, data.music.artist);
        }
        
        // 根据是否为纯音乐分享模式 设置垂直居中类
        setVerticalCenterMode(isPureMusicMode);
    }

    // 加载数据
    async function loadShareData() {
        const container = document.getElementById('cardContainer');
        if (!date) {
            container.innerHTML = '<div class="error-state">缺少日期参数，分享链接无效</div>';
            setVerticalCenterMode(false);
            return;
        }
        container.innerHTML = '<div class="loading-state"><i class="ri-loader-4-line"></i> 加载中...</div>';
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            const res = await fetch(`${API_BASE}/api/posts/${date}`, { cache: 'no-store', signal: controller.signal });
            clearTimeout(timeoutId);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderContent(data);
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error-state">加载失败，请稍后重试<br>${escapeHtml(err.message)}</div>`;
            setVerticalCenterMode(false);
        }
    }

    // 底部下载按钮
    function bindDownload() {
        const btn = document.getElementById('appDownloadBtn');
        if (btn) btn.addEventListener('click', () => {
            window.location.href = 'https://read-download.solitudenook.top';
        });
    }

    // 暗色模式同步（跟随系统，但确保 body 背景一致）
    function syncTheme() {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (isDark) {
            document.body.classList.add('dark-mode-fix');
        } else {
            document.body.classList.remove('dark-mode-fix');
        }
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', syncTheme);
    syncTheme();

    // 初始化
    loadShareData();
    bindDownload();
</script>
</body>
</html>
